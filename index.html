<!DOCTYPE html>
<html lang="zxx">

<head>
    <!-- Metas -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="keywords" content="HTML5 Template Uifolio Multi-Purpose themeforest">
    <meta name="description" content="Uifolio - Multi-Purpose HTML5 Template">
    <meta name="author" content="">

    <!-- Title  -->
    <title>Uifolio - Creative Agency & Portfolio</title>

    <!-- favicon icon -->
    <link rel="shortcut icon" href="assets/imgs/favicon.ico">
    <link rel="apple-touch-icon" href="assets/imgs/apple-touch-icon.png">
    <link rel="android-chrome" sizes="192x192" href="assets/imgs/android-chrome-192x192.png">
    <link rel="favicon" sizes="32x32" href="assets/imgs/favicon-32x32.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900&amp;display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&amp;display=swap" rel="stylesheet">

    <!-- Plugins -->
    <link rel="stylesheet" href="assets/css/plugins.css">

    <!-- Core Style Css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="startup-agency">

    <!-- Placeholder for Loader -->
    <div id="loader-placeholder"></div>

    <!-- Placeholder for Cursor -->
    <div id="cursor-placeholder"></div>

    <!-- Placeholder for Navbar -->
    <div id="navbar-placeholder"></div>

    <div id="smooth-wrapper">
        <div id="smooth-content">
            <main class="o-hidden">

                <!-- ==================== Start Header ==================== -->
                <header id="hero-header" class="hero-style5 bg-img" data-background="">
                    <div class="container">
                        <div class="row justify-content-between">
                            <div class="col-lg-7">
                                <div class="links text-uppercase md-mb30">
                                    <div><a href="#about" data-scroll-nav="0">About</a></div>
                                    <div><a href="#works" data-scroll-nav="1">Works</a></div>
                                    <div><a href="#services" data-scroll-nav="2">Services</a></div>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="md-mb30">
                                    <p id="hero-desc"></p>
                                </div>
                            </div>
                        </div>
                        <div class="caption mb-30px mt-80px">
                            <div class="d-flex align-items-center justify-content-between fs-12 text-uppercase mb-10px">
                                <span id="hero-tag1"></span>
                                <span id="hero-tag2"></span>
                                <span id="hero-tag3"></span>
                            </div>
                            <h1 id="hero-title" class="text-align-center main-color fw-700"></h1>
                        </div>
                    </div>
                </header>
                <!-- ==================== End Header ==================== -->

                <!-- ==================== Start intro image ==================== -->
                <div class="o-hidden img-bord-color">
                    <div class="bg-img h-600px" data-background="assets/imgs/hero-st.webp" data-speed="0.8"
                        data-lag="0">
                    </div>
                </div>
                <!-- ==================== End intro image ==================== -->

                <!-- ==================== Start intro text ==================== -->
                <section class="intro-style5 pb-0" data-scroll-index="0" id="about">
                    <div class="container">
                        <div class="row">
                            <div class="col-lg-4">
                                <div class="exp md-mb50" id="exp-container">
                                    <!-- Dynamic Experience -->
                                </div>
                            </div>
                            <div class="col-lg-7 offset-lg-1">
                                <div id="intro-title-container">
                                    <!-- Dynamic Intro Title -->
                                </div>
                            </div>
                            <div class="col-lg-6 offset-lg-6 text pl-40px pb-80px line-left border-color-transparent-white-light" id="intro-desc-container">
                                <!-- Dynamic Intro Description -->
                            </div>
                        </div>
                    </div>
                </section>
                <!-- ==================== End intro text ==================== -->

                <!-- ==================== Start Services Grid ==================== -->
                <section class="serv-style4 p-0" id="services">
                    <div class="container-fluid">
                        <div class="row" id="general-services-container">
                            <!-- Dynamic General Services -->
                        </div>
                    </div>
                </section>
                <!-- ==================== End Services Grid ==================== -->

                <!-- ==================== Start portfolio ==================== -->
                <section class="portfolio-crev" data-scroll-index="1" id="works">
                    <div class="container">
                        <div class="sec-head-stand mb-80px">
                            <div class="sm-title-dot">Latest Projects</div>
                        </div>
                        <div class="work-boxs" id="portfolio-container">
                            <!-- Dynamic Projects -->
                        </div>
                    </div>
                </section>
                <!-- ==================== End portfolio ==================== -->

                <!-- ==================== Start Featured Services Accordion ==================== -->
                <section class="serv-style3 pt-0" data-scroll-index="2">
                    <div class="container">
                        <div class="sec-head-stand mb-80px">
                            <div class="sm-title-dot">Featured Services</div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <div class="accordion wow fadeIn" data-wow-delay="0.4s" id="accordionExample">
                                    <div id="featured-services-accordion">
                                        <!-- Dynamic Featured Services Accordions -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- ==================== End Featured Services Accordion ==================== -->

                <!-- ==================== Start Testimonials ==================== -->
                <section class="testim-style3 line-top border-color-transparent-white-light">
                    <div class="container">
                        <div class="row">
                            <div class="col-lg-4 v-align-between md-mb80">
                                <div class="sec-head-stand mb-30px">
                                    <div class="sm-title-dot mb-30px">Testimonials</div>
                                    <h2 class="fs-50">What <span class="d-inline fw-200">our clients</span> say?</h2>
                                </div>
                                <div class="rate">
                                    <h2>4.8 <span class="fs-12 opacity-7">Total Reviews</span></h2>
                                </div>
                            </div>
                            <div class="col-lg-6 offset-lg-2">
                                <div class="testim-swiper">
                                    <div class="swiper-wrapper" id="testimonials-wrapper">
                                        <!-- Dynamic Testimonial Slides -->
                                    </div>
                                    <div class="swiper-controls swiper-contr-style3 d-flex justify-content-between">
                                        <div class="swiper-button-prev"></div>
                                        <div class="swiper-button-next"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- ==================== End Testimonials ==================== -->

                <!-- ==================== Start Team ==================== -->
                <section class="fix-title-sec team-style3 sub-bg border-radius-50px">
                    <div class="sec-head-crev text-align-center mb-80px">
                        <h2 class="fs-85 fw-700 text-uppercase main-color">Our Team <br> Members</h2>
                    </div>
                    <div class="container-xxl">
                        <div class="row" id="team-container">
                            <!-- Dynamic Team Members -->
                        </div>
                    </div>
                </section>
                <!-- ==================== End Team ==================== -->

                <!-- ==================== Start Blogs Slider ==================== -->
                <section class="blog-style2">
                    <div class="container">
                        <div class="row justify-content-center">
                            <div class="col-lg-6 col-md-10">
                                <div class="sec-head-stand text-align-center mb-80px">
                                    <div class="sm-title-dot mb-15px">Our News</div>
                                    <h2 class="fs-50">Latest <span class="d-inline fw-200">Creative Thinking</span> Journals</h2>
                                </div>
                            </div>
                        </div>
                        <div class="swiper-container">
                            <div class="swiper-wrapper" id="blogs-wrapper">
                                <!-- Dynamic Blog Slides -->
                            </div>
                        </div>
                    </div>
                </section>
                <!-- ==================== End Blogs Slider ==================== -->

                <!-- ==================== Start Contact Form ==================== -->
                <section class="contact-crev section-padding" id="contact">
                    <div class="container">
                        <div class="row justify-content-center">
                            <div class="col-lg-6 col-md-10">
                                <div class="sec-head-stand text-align-center mb-80px">
                                    <div class="sm-title-dot mb-15px">Contact Us</div>
                                    <h2 class="fs-50">Let's Get <span class="d-inline fw-200">In Touch</span></h2>
                                </div>
                            </div>
                        </div>
                        <div class="row justify-content-center">
                            <div class="col-lg-8">
                                <form id="contact-form" class="form-style1">
                                    <div class="row">
                                        <div class="col-lg-6 mb-30px">
                                            <input type="text" name="name" placeholder="Your Name *" required class="form-control">
                                        </div>
                                        <div class="col-lg-6 mb-30px">
                                            <input type="email" name="email" placeholder="Your Email *" required class="form-control">
                                        </div>
                                        <div class="col-lg-12 mb-30px">
                                            <input type="text" name="subject" placeholder="Subject" class="form-control">
                                        </div>
                                        <div class="col-lg-12 mb-30px">
                                            <textarea name="message" placeholder="Message *" rows="6" required class="form-control"></textarea>
                                        </div>
                                        <div class="col-lg-12 text-align-center">
                                            <button type="submit" class="butn border-radius-5px">
                                                <span class="text">Send Message</span>
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- ==================== End Contact Form ==================== -->

                <!-- Placeholder for Footer -->
                <div id="footer-placeholder"></div>

            </main>
        </div>
    </div>

    <!-- jQuery -->
    <script src="assets/js/jquery-3.6.0.min.js"></script>
    <script src="assets/js/jquery-migrate-3.4.0.min.js"></script>

    <!-- plugins -->
    <script src="assets/js/plugins.js"></script>

    <!-- render engine (must run after jQuery and plugins, but before GSAP/scripts.js ready handlers execute) -->
    <script src="assets/js/render.js"></script>

    <!-- GSAP / Animations -->
    <script src="assets/js/gsap.min.js"></script>
    <script src="assets/js/ScrollSmoother.min.js"></script>
    <script src="assets/js/ScrollTrigger.min.js"></script>
    <script src="assets/js/smoother-script.js"></script>

</body>

</html>
